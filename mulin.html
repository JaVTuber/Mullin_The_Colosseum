<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>El Coliseo</title>
		
		<link rel="stylesheet" href="./assets/styles.css">
		<script type="module" src="./assets/scripts/main.js" defer></script>
	</head>
	<body>
		<section id="visuals">
			<canvas id="canvas"></canvas>
		</section>
		<section id="GUI">
			<article id="CHOOSING">
				<div id="p1">
					<fieldset>
						<legend>Jugador/a 1</legend>
						<table class="player1" id="optionsP1"></table>
					</fieldset>
				</div>
				<div id="start">
					<button id="starter">Start!</button>
				</div>
				<div id="p2">
					<fieldset>
						<legend>Jugador/a 2</legend>
						<table class="player2" id="optionsP2"></table>
					</fieldset>
				</div>
			</article>
			<article id="FIGHTING">
				<div id="cont">
					<div id="chTitle">
						<h2 class="chName">Mulín</h3>
						<h4 class="chName">Habilidad(es)</h4>
					</div>
					<div id="menu" class="menu">
						<div id="mons" class="menu">
							<fieldset id="weapons" class="noTop">
								<legend>Weapon</legend>
								<p>Habilidad</p>
								<button class="btnAction">Ataque (5/10)</button>
								<button class="btnAction">Cambio</button>
							</fieldset>
							<fieldset id="summons">
								<legend>Summon</legend>
								<button class="btnAction">Ataque</button>
								<button class="btnAction">Ataque</button>
								<br>
								<button class="btnAction">Ataque</button>
								<button class="btnAction">Cambio</button>
							</fieldset>
						</div>
						<div id="obj" class="menu">
							<fieldset id="spells">
								<legend>Hechizos</legend>
								<button>Espekto Partonus</button>
								<button>Hollo blanco</button>
								<button>Conviertete en Taza</button>
								<p class="indexer">></p>
							</fieldset>
							<fieldset id="theBag" class="noTop">
								<legend>Bolsita</legend>
								<table>
									<tr>
										<td>Wpn 1</td>
										<td>Smn 1</td>
									</tr>
									<tr>
										<td>Weapon 2</td>
										<td>Smn 2</td>
									</tr>
									<tr>
										<td></td>
										<td>Sumn 3</td>
									</tr>
								</table>
								<p class="indexer">></p>
							</fieldset>
						</div>
					</div>			
				</div>
			</article>
			<article id="RESULTS">
				
			</article>
		</section>
	</body>
</html>
